<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Analytics Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f2f2f7;
            color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .header {
            background: linear-gradient(145deg, #007AFF, #0051D5);
            padding: 32px 24px;
            color: white;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        .header p { font-size: 15px; opacity: 0.9; }
        .content { padding: 24px; }
        .stats-preview {
            background: #f8f9ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e9ecff;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .stat-label { color: #6c757d; }
        .stat-value { font-weight: 600; color: #007AFF; }
        .divider {
            height: 1px;
            background: #e9ecff;
            margin: 16px 0;
        }
        .period-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .period-btn {
            flex: 1;
            background: #f2f2f7;
            border: none;
            padding: 16px 0;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        .period-btn.active {
            background: #007AFF;
            color: white;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .scan-btn {
            width: 100%;
            background: #007AFF;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .scan-btn:active { transform: scale(0.97); background: #005bbf; }
        .scan-btn:disabled { opacity: 0.5; pointer-events: none; }
        
        /* Прогресс-сканер */
        .progress-container {
            background: #f2f2f7;
            border-radius: 100px;
            height: 8px;
            overflow: hidden;
            margin: 24px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: #007AFF;
            width: 0%;
            transition: width 0.3s ease;
        }
        .scanning-text {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin: 16px 0;
            display: none;
        }
        
        /* Результаты */
        .results {
            margin-top: 24px;
            display: none;
        }
        .result-item {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e9ecff;
            animation: fadeIn 0.5s;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .result-name { font-weight: 600; }
        .result-time { color: #6c757d; font-size: 13px; }
        .result-details {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #6c757d;
        }
        .result-details span { display: flex; align-items: center; gap: 4px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #f5222d;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            display: none;
        }
        
        .note {
            text-align: center;
            color: #8e8e93;
            font-size: 12px;
            margin-top: 16px;
        }
        
        /* Экран авторизации */
        .auth-screen {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .auth-screen h3 { margin-bottom: 16px; color: #007AFF; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 TG Analytics</h1>
            <p>Сканер посетителей профиля</p>
        </div>
        
        <div class="content">
            <!-- Экран авторизации (если нет сессии) -->
            <div id="authScreen" class="auth-screen">
                <h3>🔐 Требуется авторизация</h3>
                <p style="margin-bottom: 20px;">Вернитесь в чат с ботом и нажмите «Авторизация», затем введите код</p>
                <button class="scan-btn" onclick="closeApp()">Закрыть</button>
            </div>
            
            <!-- Основной интерфейс -->
            <div id="mainInterface">
                <div class="stats-preview">
                    <div class="stat-row">
                        <span class="stat-label">👁 Просмотров за 24ч:</span>
                        <span class="stat-value" id="viewsToday">...</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">👥 Уникальных:</span>
                        <span class="stat-value" id="uniqueViews">...</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">📱 Устройств:</span>
                        <span class="stat-value" id="devices">...</span>
                    </div>
                </div>
                
                <div class="period-selector">
                    <button class="period-btn active" onclick="selectPeriod(7)">7 дней</button>
                    <button class="period-btn" onclick="selectPeriod(30)">30 дней</button>
                    <button class="period-btn" onclick="selectPeriod(60)">60 дней</button>
                </div>
                
                <button class="scan-btn" id="scanBtn" onclick="startScan()">
                    🔍 Начать сканирование
                </button>
                
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                
                <div class="scanning-text" id="scanningText">
                    Анализ логов посещений... 0%
                </div>
                
                <div class="error-message" id="errorMessage"></div>
                
                <div class="results" id="results"></div>
                
                <div class="note">
                    Данные обновляются в реальном времени
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let selectedDays = 7;
        let isScanning = false;
        
        // Проверяем, авторизован ли пользователь через бота
        // В реальности здесь должна быть проверка через бота
        const urlParams = new URLSearchParams(window.location.search);
        const hasSession = urlParams.get('session') || true; // Для теста всегда true
        
        if (!hasSession) {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('mainInterface').style.display = 'none';
        }
        
        // Генерация случайных предварительных данных
        function generateRandomStats() {
            document.getElementById('viewsToday').textContent = Math.floor(Math.random() * 50 + 20);
            document.getElementById('uniqueViews').textContent = Math.floor(Math.random() * 30 + 10);
            document.getElementById('devices').textContent = ['iOS', 'Android', 'Desktop', 'Web'][Math.floor(Math.random() * 4)];
        }
        
        generateRandomStats();
        
        function selectPeriod(days) {
            selectedDays = days;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function startScan() {
            if (isScanning) return;
            
            isScanning = true;
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('scanningText').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            
            // Имитация сканирования
            let progress = 0;
            const names = [
                'Анна С.', 'Максим К.', 'Елена В.', 'Дмитрий П.', 
                'Ольга Н.', 'Игорь М.', 'Татьяна Л.', 'Алексей Р.',
                'Наталья С.', 'Сергей Д.', 'Юлия А.', 'Андрей Г.',
                'Екатерина Ф.', 'Владимир Б.', 'Ксения Ц.', 'Павел Ш.'
            ];
            
            const devices = ['iPhone', 'Android', 'Desktop', 'iPad', 'MacBook'];
            const cities = ['Москва', 'СПб', 'Казань', 'Новосибирск', 'Екатеринбург', 'Краснодар', 'Сочи'];
            
            const interval = setInterval(() => {
                progress += Math.random() * 5 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // Генерация результатов
                    const results = [];
                    const count = Math.floor(Math.random() * 8 + 5); // 5-13 результатов
                    
                    for (let i = 0; i < count; i++) {
                        const randomName = names[Math.floor(Math.random() * names.length)];
                        const randomTime = `${Math.floor(Math.random() * 23)}:${String(Math.floor(Math.random() * 59)).padStart(2, '0')}`;
                        const randomDate = `${Math.floor(Math.random() * 28 + 1)} мар`;
                        const randomDevice = devices[Math.floor(Math.random() * devices.length)];
                        const randomCity = cities[Math.floor(Math.random() * cities.length)];
                        
                        results.push({
                            name: randomName,
                            time: `${randomDate} в ${randomTime}`,
                            device: randomDevice,
                            city: randomCity,
                            views: Math.floor(Math.random() * 5 + 1)
                        });
                    }
                    
                    // Сортируем по времени (самые новые первые)
                    displayResults(results);
                    
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('scanningText').style.display = 'none';
                    document.getElementById('progressContainer').style.display = 'none';
                    isScanning = false;
                    
                    // Отправляем сигнал боту что сканирование завершено
                    try {
                        tg.sendData(JSON.stringify({
                            t: 'scan_complete',
                            count: results.length,
                            days: selectedDays
                        }));
                    } catch (e) {}
                    
                }
                
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('scanningText').innerHTML = 
                    `🔍 Анализ логов посещений... ${Math.floor(progress)}%`;
                
            }, 200);
        }
        
        function displayResults(results) {
            const container = document.getElementById('results');
            container.innerHTML = '<h3 style="margin-bottom: 16px;">📋 Результаты сканирования</h3>';
            
            results.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-header">
                            <span class="result-name">👤 ${item.name}</span>
                            <span class="result-time">⏱ ${item.time}</span>
                        </div>
                        <div class="result-details">
                            <span>📱 ${item.device}</span>
                            <span>📍 ${item.city}</span>
                            <span>👁 ${item.views} ${item.views === 1 ? 'просмотр' : 'просмотров'}</span>
                        </div>
                    `;
                    container.appendChild(div);
                }, index * 100);
            });
            
            container.style.display = 'block';
        }
        
        function closeApp() {
            tg.close();
        }
        
        // Обработка ошибок
        window.addEventListener('error', function(e) {
            document.getElementById('errorMessage').textContent = 'Произошла ошибка. Попробуйте позже.';
            document.getElementById('errorMessage').style.display = 'block';
        });
        
        // Обработка данных от бота
        tg.onEvent('web_app_data_sent', function() {
            console.log('Data sent to bot');
        });
    </script>
</body>
</html>
